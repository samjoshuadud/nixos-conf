# в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
# в”Ӯ                          в”Ӯ
# в”Ӯ     в–‘в–Җв–Ҳв–Җв–‘в–Ҳв–„в–Ҳв–‘в–Ҳв–‘в–Ҳв–‘в–Ҳв–‘в–Ҳ     в”Ӯ
# в”Ӯ     в–‘в–‘в–Ҳв–‘в–‘в–Ҳв–‘в–Ҳв–‘в–Ҳв–‘в–Ҳв–‘в–„в–Җв–„     в”Ӯ
# в”Ӯ     в–‘в–‘в–Җв–‘в–‘в–Җв–‘в–Җв–‘в–Җв–Җв–Җв–‘в–Җв–‘в–Җ     в”Ӯ
# в”Ӯ                          в”Ӯ
# в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ

# Set default shell
set-option -g default-shell $SHELL

# Set true color
set-option -sa terminal-overrides ",xterm*:Tc"

# Set mouse mode on
set -g mouse on

set -g default-terminal "tmux-256color"
# Set prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window
#
# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g status-position bottom

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# Theme: borders
set -g pane-border-lines single
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=red

# Theme: status
set -g status-style bg=default,fg=brightblack
set -g status-left "#[fg=brightblack,bright]#(basename \"#{pane_current_path}\")"
set -g status-right "#[fg=brightblack,bright]#S"

# Theme: status (windows)
set -g window-status-format "в—Ҹ"
set -g window-status-current-format "в—Ҹ"
set -g window-status-current-style "#{?window_zoomed_flag,fg=yellow,fg=red,nobold}"
set -g window-status-bell-style "fg=red,nobold"
set -g status-justify absolute-centre
#
# Smart pane switching вҖ” @pane-is-vim is set by smart-splits.nvim (zero latency)
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'

# Smart pane resizing
bind-key -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l' 'resize-pane -R 3'

# Set vi-mode
set-window-option -g mode-keys vi

# Yazi
set -g allow-passthrough on

set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# custom keybinds
bind g popup -d "#{pane_current_path}" -xC -yC -w 90% -h 90% -E lazygit
bind p popup -d "#{pane_current_path}" -xC -yC -w 50% -h 50% 
bind q popup -d "#{pane_current_path}" -xC -yC -w 90% -h 90% -E lazysql
bind e popup -d "#{pane_current_path}" -xC -yC -w 90% -h 90% -E 'tmux new-session yazi \; set status off'

# Open panes in current directory
bind - split-window -c '#{pane_current_path}'
bind / split-window -h -c '#{pane_current_path}'

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

run '~/.tmux/plugins/tpm/tpm'

